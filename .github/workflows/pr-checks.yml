name: PR Checks

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read
  statuses: write

jobs:
  pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            ci
            build
            perf
            style
          requireScope: false
          subjectPattern: ^.+$
          subjectPatternError: "PR title must have a subject after the type prefix."

  commitlint:
    name: Lint Commit Messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.mjs
          # Only lint the most recent commits authored on this branch.
          # Sync-upstream PRs drag in the upstream's full history (e.g.
          # "Feat/UI init (#8)" squash titles) which we don't own and
          # can't rewrite. `firstParent` alone doesn't filter PR-listed
          # commits coming from a merge; commitDepth caps lint to our
          # own work. Bump this if a PR ever has more than 6 local
          # commits before merge.
          commitDepth: 6
