# fly.toml app configuration file for solayer-ai

app = 'solayer-ai'
primary_region = 'sin'

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  GIN_MODE = "release"
  SESSION_COOKIE_SECURE = "true"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[[mounts]]
  source = "solayer_data"
  destination = "/data"
  initial_size = "3gb"
