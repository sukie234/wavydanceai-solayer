<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-light-192.png" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-dark-192.png" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/png" sizes="64x64" href="/icon-light-64.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-light-192.png" />
    <title>wavydance.ai — One Wave. Every Model.</title>
    <meta name="description" content="The unified gateway to every LLM API." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply theme before paint to avoid FOUC.
      (() => {
        const stored = localStorage.getItem('wavy.theme')
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        const theme = stored ?? (prefersDark ? 'dark' : 'light')
        document.documentElement.setAttribute('data-theme', theme)
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
