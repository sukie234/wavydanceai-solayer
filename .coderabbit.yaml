# CodeRabbit AI Code Review Configuration
# https://docs.coderabbit.ai/getting-started/yaml-configuration

language: "en-US"
early_access: false

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  review_status: true
  auto_review:
    enabled: true
    drafts: false
    incremental_reviews: true
  path_filters:
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/vendor/**"
    - "!**/coverage/**"
    - "!**/*.min.js"
    - "!**/*.min.css"
    - "!**/package-lock.json"
    - "!**/yarn.lock"
    - "!**/pnpm-lock.yaml"
    - "!**/bun.lock"
    # Legacy themes deleted during the wavy frontend rewrite — pure
    # deletions of dead code, no value in a line-by-line review.
    - "!web/air/**"
    - "!web/berry/**"
    - "!web/default/**"
    # Brand reference (HTML prototype + design assets), not shipped code.
    - "!web/web_reference/**"
    # Generated by TanStack Router's Vite plugin.
    - "!web/wavy/src/routeTree.gen.ts"
  path_instructions: []
    # Add domain-specific review guidance per path when needed. Examples:
    # - path: "src/api/**"
    #   instructions: "Focus on input validation, authentication, and rate limiting."
    # NOTE: keep this key as an explicit empty array `[]` until you add entries —
    # leaving it bare (`path_instructions:` followed only by comments) makes the
    # YAML value `null`, which fails CodeRabbit's array validation and silently
    # falls back to default config (no path_filters honored).

chat:
  auto_reply: true
