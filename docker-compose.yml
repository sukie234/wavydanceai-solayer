# Local development stack for wavydance.ai.
# Mirrors the staging/prod runtime (Postgres + Redis) so what works
# here works in deployment. See docs/DEVELOPMENT.md for usage.
#
# Quick start:  cp .env.example .env  &&  make up

services:
  app:
    container_name: wavydance-app
    build:
      context: .
      dockerfile: Dockerfile
    image: wavydance:local
    restart: unless-stopped
    command: ["--log-dir", "/app/logs", "--port", "3000"]
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      SQL_DSN: "postgres://wavydance:wavydance@db:5432/wavydance?sslmode=disable"
      REDIS_CONN_STRING: "redis://redis:6379"
      SESSION_SECRET: "${SESSION_SECRET:-local-dev-secret-do-not-use-in-prod}"
      SESSION_COOKIE_SECURE: "false"
      INITIAL_ROOT_PASSWORD: "${INITIAL_ROOT_PASSWORD:-change-me-locally}"
      TZ: "${TZ:-UTC}"
      DEBUG_SQL: "${DEBUG_SQL:-false}"
    volumes:
      - app_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -q '\"success\":true'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  db:
    container_name: wavydance-db
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: wavydance
      POSTGRES_PASSWORD: wavydance
      POSTGRES_DB: wavydance
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wavydance -d wavydance"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    container_name: wavydance-redis
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  db_data:
  app_logs:
