    delete:
      tags: [AdminUsers]
      summary: Delete a user (admin)
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EnvelopeEmpty" } } } }
  /api/user/{id}/passkeys:
    delete:
      tags: [AdminUsers]
