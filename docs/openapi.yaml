        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, action]
              properties:
                username: { type: string }
                action: { type: string, enum: [disable, enable, delete, promote, demote] }
      responses:
        "200": { description: "data: { role, status }", content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } } }
  /api/user/{id}:
