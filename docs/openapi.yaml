  # ---------------------------------------------------------------- TopUp
  /api/user/topup:
    post:
      tags: [TopUp]
      summary: Redeem a code
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [key], properties: { key: { type: string } } } } }
      responses:
        "200": { description: "data: { quota }", content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } } }
    get:
      tags: [TopUp]
      summary: Admin top-up list
      parameters:
        - { name: p, in: query, schema: { type: integer } }
        - { name: size, in: query, schema: { type: integer } }
        - { name: user_id, in: query, schema: { type: integer } }
        - { name: status, in: query, schema: { type: string } }
        - { name: gateway, in: query, schema: { type: string } }
        - { name: start, in: query, schema: { type: integer, format: int64 } }
        - { name: end, in: query, schema: { type: integer, format: int64 } }
      responses:
        "200": { description: "data: Topup[]", content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } } }
  /api/user/topup/complete:
    post:
      tags: [TopUp]
      summary: Admin settle a pending top-up
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [trade_no], properties: { trade_no: { type: string }, note: { type: string } } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EnvelopeEmpty" } } } }
  /api/user/topup/info:
    get:
      tags: [TopUp]
      summary: Top-up gateway config
      responses:
        "200":
          description: "{ stripe_enabled, epay_enabled, crypto_adapters[], amount_options[], return_url }"
          content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } }
  /api/user/topup/self:
    get:
      tags: [TopUp]
      summary: Own top-up history
      parameters:
        - { name: p, in: query, schema: { type: integer, default: 1 } }
        - { name: size, in: query, schema: { type: integer, default: 20 } }
      responses:
        "200": { description: "data: Topup[]", content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } } }
  /api/user/topup/amount:
    post:
      tags: [TopUp]
      summary: Preview money → quota conversion
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [money], properties: { money: { type: integer, format: int64, description: "cents" } } } } }
      responses:
        "200": { description: "data: { money, quota }", content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } } }
  /api/user/topup/stripe:
    post:
      tags: [TopUp]
      summary: Create a Stripe payment
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [money], properties: { money: { type: integer, format: int64, description: "cents, ≥100" } } } } }
      responses:
        "200": { description: "data: { trade_no, pay_url }", content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } } }
  /api/user/topup/epay:
    post:
      tags: [TopUp]
      summary: Create an EPay payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [money]
              properties:
                money: { type: integer, format: int64, description: "cents, ≥100" }
                pay_method: { type: string, enum: [alipay, wxpay, qqpay] }
      responses:
        "200": { description: "data: { trade_no, pay_url }", content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } } }
  /api/user/topup/crypto/{adapter}:
    post:
      tags: [TopUp]
      summary: Create a crypto payment
      parameters:
        - { name: adapter, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [money], properties: { money: { type: integer, format: int64, description: "cents, ≥100" } } } } }
      responses:
        "200": { description: "data: { trade_no, pay_url }", content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } } }
  /api/topup:
    post:
      tags: [TopUp]
      summary: Admin manual credit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, quota]
              properties:
                user_id: { type: integer }
                quota: { type: integer }
                remark: { type: string }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EnvelopeEmpty" } } } }
  /dashboard/billing/subscription:
    get:
      tags: [TopUp]
      summary: OpenAI-compatible subscription (sk- token, no envelope)
      security: [{ RelayToken: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  object: { type: string }
                  has_payment_method: { type: boolean }
                  soft_limit_usd: { type: number }
                  hard_limit_usd: { type: number }
                  system_hard_limit_usd: { type: number }
                  access_until: { type: integer, format: int64 }
  /dashboard/billing/usage:
    get:
      tags: [TopUp]
      summary: OpenAI-compatible usage (sk- token, no envelope)
      security: [{ RelayToken: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  object: { type: string }
                  total_usage: { type: number, description: "0.01-dollar units" }

