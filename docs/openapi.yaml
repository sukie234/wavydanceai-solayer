openapi: 3.0.3
info:
  title: WavyDance Platform API
  version: "1.0.0"
  description: |
    Management / console API used by the web frontend — user accounts, tokens,
    channels, redemptions, logs, billing and top-ups.

    This is **not** the LLM relay API (`/v1/chat/completions`, `/v1/images/...`,
    `/v1/videos`). For that, end users call the OpenAI-compatible endpoints with
    an `sk-` token.

    ## Response envelope
    Every `/api/**` endpoint returns `{ success, message, data }`. Most business
    errors return HTTP 200 with `success: false` — always check `success`, not
    just the status code. The two `dashboard/billing/*` endpoints are the
    exception and return an OpenAI-compatible object directly (no envelope).

    ## Auth
    - **Session cookie** — set by `POST /api/user/login`; the browser uses it for
      everything. Same-origin "Try it out" in this UI sends the cookie
      automatically.
    - **Access token** — from `GET /api/user/token`, sent in the `Authorization`
      header **verbatim** (no `Bearer` prefix). Use the `AccessToken` scheme below.
    - **`sk-` relay token** — only for the `dashboard/billing/*` endpoints.

servers:
  - url: /
    description: Same origin as this UI

tags:
  - name: Auth
    description: Registration, login, 2FA, password reset
  - name: Self
    description: The current user's own account
  - name: 2FA
    description: TOTP two-factor authentication
  - name: Passkeys
    description: WebAuthn credentials and passkey login
  - name: Tokens
    description: Relay (sk-) API keys
  - name: Channels
    description: Upstream provider connections (admin)
  - name: Redemptions
    description: Gift / redemption codes (admin)
  - name: Logs
  - name: TopUp
    description: Top-up and billing
  - name: Checkin
  - name: AdminUsers
    description: User administration
  - name: System
    description: Groups, options, models, status
  - name: Playground

security:
  - AccessToken: []

components:
  securitySchemes:
    AccessToken:
      type: apiKey
      in: header
      name: Authorization
      description: >
        Personal access token from `GET /api/user/token`, sent verbatim (no
        `Bearer` prefix). Session-cookie auth also works same-origin without
        this.
    RelayToken:
      type: http
      scheme: bearer
      description: An `sk-` relay token. Only used by the dashboard/billing endpoints.

  schemas:
    Envelope:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        data: {}
      required: [success, message]
    EnvelopeEmpty:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
      required: [success, message]

    User:
      type: object
      properties:
        id: { type: integer }
        username: { type: string }
        display_name: { type: string }
        role: { type: integer, description: "1 common · 10 admin · 100 root" }
        status: { type: integer, description: "1 enabled · 2 disabled" }
        email: { type: string }
        quota: { type: integer, format: int64 }
        used_quota: { type: integer, format: int64 }
        request_count: { type: integer }
        group: { type: string }
        aff_code: { type: string }
        inviter_id: { type: integer }
        two_fa_enabled: { type: boolean }

    Token:
      type: object
      properties:
        id: { type: integer }
        user_id: { type: integer }
        key: { type: string, description: "the sk- value (clients send sk-<key>)" }
        name: { type: string }
        status: { type: integer, description: "1 enabled · 2 disabled · 3 expired · 4 exhausted" }
        created_time: { type: integer, format: int64 }
        accessed_time: { type: integer, format: int64 }
        expired_time: { type: integer, format: int64, description: "-1 = never" }
        remain_quota: { type: integer, format: int64 }
        unlimited_quota: { type: boolean }
        used_quota: { type: integer, format: int64 }
        models: { type: string, nullable: true, description: "comma-separated allow-list; null = all" }
        subnet: { type: string, nullable: true, description: "CIDR allow-list; null = any IP" }

    Channel:
      type: object
      properties:
        id: { type: integer }
        type: { type: integer, description: "provider/adaptor type id" }
        key: { type: string }
        name: { type: string }
        status: { type: integer, description: "1 enabled · 2 manually disabled · 3 auto-disabled" }
        weight: { type: integer, nullable: true }
        priority: { type: integer, format: int64, nullable: true }
        base_url: { type: string, nullable: true }
        models: { type: string, description: "comma-separated supported models" }
        group: { type: string, default: "default" }
        model_mapping: { type: string, nullable: true, description: "JSON map of model aliases" }
        config: { type: string, description: "JSON adaptor config" }
        system_prompt: { type: string, nullable: true }
        balance: { type: number, format: double }
        balance_updated_time: { type: integer, format: int64 }
        response_time: { type: integer, description: "last test latency (ms)" }
        used_quota: { type: integer, format: int64 }
        created_time: { type: integer, format: int64 }

    Redemption:
      type: object
      properties:
        id: { type: integer }
        user_id: { type: integer }
        key: { type: string }
        name: { type: string }
        status: { type: integer, description: "1 enabled · 2 disabled · 3 used" }
        quota: { type: integer, format: int64 }
        created_time: { type: integer, format: int64 }
        redeemed_time: { type: integer, format: int64 }

    Log:
      type: object
      properties:
        id: { type: integer }
        user_id: { type: integer }
        created_at: { type: integer, format: int64 }
        type: { type: integer }
        content: { type: string }
        username: { type: string }
        token_name: { type: string }
        model_name: { type: string }
        quota: { type: integer }
        prompt_tokens: { type: integer }
        completion_tokens: { type: integer }
        channel: { type: integer }
        request_id: { type: string }
        elapsed_time: { type: integer, format: int64, description: "ms" }
        is_stream: { type: boolean }
        system_prompt_reset: { type: boolean }

  parameters:
    Page:
      name: p
      in: query
      schema: { type: integer }
      description: Page number
    Keyword:
      name: keyword
      in: query
      required: true
      schema: { type: string }
    IdPath:
      name: id
      in: path
      required: true
      schema: { type: integer }

paths:
  # ---------------------------------------------------------------- Auth
  /api/user/register:
    post:
      tags: [Auth]
      summary: Register a new account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string, description: "3–12 chars, alphanumeric/_/-" }
                password: { type: string, description: "8–24 chars, complexity checked" }
                email: { type: string }
                verification_code: { type: string, description: "required when email verification is on" }
                aff_code: { type: string, description: "inviter referral code" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EnvelopeEmpty" } } } }
  /api/user/login:
    post:
      tags: [Auth]
      summary: Password login (may trigger 2FA)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        "200":
          description: "User object, or { two_factor_required, methods }"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
  /api/user/login/2fa:
    post:
      tags: [Auth]
      summary: Complete 2FA at login with TOTP or backup code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } } }
  /api/user/logout:
    get:
      tags: [Auth]
      summary: Clear session
      security: []
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EnvelopeEmpty" } } } }
  /api/verification:
    get:
      tags: [Auth]
      summary: Send email verification code
      security: []
      parameters:
        - { name: email, in: query, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EnvelopeEmpty" } } } }
  /api/reset_password:
    get:
      tags: [Auth]
      summary: Send password-reset email
      security: []
      parameters:
        - { name: email, in: query, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EnvelopeEmpty" } } } }
  /api/user/reset:
    post:
      tags: [Auth]
      summary: Reset password with emailed token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, token]
              properties:
                email: { type: string }
                token: { type: string }
      responses:
        "200":
          description: "data: { password } (temporary)"
          content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } }
  /api/oauth/email/bind:
    get:
      tags: [Auth]
      summary: Bind an email to the current account
      parameters:
        - { name: email, in: query, required: true, schema: { type: string } }
        - { name: code, in: query, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EnvelopeEmpty" } } } }

  # ---------------------------------------------------------------- Self
  /api/user/self:
    get:
      tags: [Self]
      summary: Get current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties: { data: { $ref: "#/components/schemas/User" } }
    put:
      tags: [Self]
      summary: Update own username / password / display name
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username: { type: string }
                password: { type: string, description: "8–24 chars if provided" }
                display_name: { type: string, description: "≤ 20 chars" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EnvelopeEmpty" } } } }
    delete:
      tags: [Self]
      summary: Delete own account
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EnvelopeEmpty" } } } }
  /api/user/dashboard:
    get:
      tags: [Self]
      summary: 7-day usage by model
      responses:
        "200":
          description: "data: [{ model, day, count, tokens }]"
          content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } }
  /api/user/token:
    get:
      tags: [Self]
      summary: Generate / rotate personal access token
      responses:
        "200":
          description: "data: { access_token }"
          content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } }
  /api/user/aff:
    get:
      tags: [Self]
      summary: Get referral (affiliate) code
      responses:
        "200":
          description: "data: { aff_code }"
          content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } }
  /api/user/available_models:
    get:
      tags: [Self]
      summary: Models available to this user
      responses:
        "200":
          description: "data: string[]"
          content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } }

  # ---------------------------------------------------------------- 2FA
  /api/user/2fa/status:
    get:
      tags: [2FA]
      summary: 2FA status
      responses:
        "200":
          description: "data: { enabled, backup_codes_remaining }"
          content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } }
  /api/user/2fa/setup:
    post:
      tags: [2FA]
      summary: Begin 2FA setup (returns secret + QR)
      responses:
        "200":
          description: "data: { secret, otpauth_url, qr_png_b64, backup_codes[] }"
          content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } }
  /api/user/2fa/enable:
    post:
      tags: [2FA]
      summary: Enable 2FA with a valid TOTP code
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [code], properties: { code: { type: string } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EnvelopeEmpty" } } } }
  /api/user/2fa/disable:
    post:
      tags: [2FA]
      summary: Disable 2FA (TOTP or backup code)
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [code], properties: { code: { type: string } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EnvelopeEmpty" } } } }
  /api/user/2fa/backup-codes:
    post:
      tags: [2FA]
      summary: Regenerate backup codes (TOTP or backup code)
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [code], properties: { code: { type: string } } }
      responses:
        "200":
          description: "data: { backup_codes[] }"
          content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } }

  # ---------------------------------------------------------------- Passkeys
  /api/user/passkey/credentials:
    get:
      tags: [Passkeys]
      summary: List my passkeys
      responses:
        "200":
          description: "data: [{ id, name, transports, created_at, last_used_at }]"
          content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } }
  /api/user/passkey/credentials/register/begin:
    post:
      tags: [Passkeys]
      summary: Begin passkey registration (WebAuthn creation options)
      requestBody:
        content:
          application/json:
            schema: { type: object, properties: { name: { type: string, maxLength: 64 } } }
      responses:
        "200": { description: "WebAuthn CredentialCreationOptions", content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } } }
  /api/user/passkey/credentials/register/finish:
    post:
      tags: [Passkeys]
      summary: Finish passkey registration (raw attestation JSON)
      requestBody:
        required: true
        content: { application/json: { schema: { type: object } } }
      responses:
        "200": { description: "data: { id, name, transports, created_at }", content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } } }
  /api/user/passkey/credentials/{id}:
    patch:
      tags: [Passkeys]
      summary: Rename a passkey
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [name], properties: { name: { type: string, maxLength: 64 } } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EnvelopeEmpty" } } } }
    delete:
      tags: [Passkeys]
      summary: Delete a passkey
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EnvelopeEmpty" } } } }
  /api/user/login/passkey/begin:
    post:
      tags: [Passkeys]
      summary: Begin passkey login (WebAuthn request options)
      security: []
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [username], properties: { username: { type: string } } } } }
      responses:
        "200": { description: "WebAuthn CredentialRequestOptions", content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } } }
  /api/user/login/passkey/finish:
    post:
      tags: [Passkeys]
      summary: Finish passkey login (raw assertion JSON)
      security: []
      requestBody:
        required: true
        content: { application/json: { schema: { type: object } } }
      responses:
        "200": { description: "data: User", content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } } }
  /api/user/login/2fa/passkey/begin:
    post:
      tags: [Passkeys]
      summary: Begin passkey second factor (after password login flagged 2FA)
      security: []
      responses:
        "200": { description: "WebAuthn CredentialRequestOptions", content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } } }
  /api/user/login/2fa/passkey/finish:
    post:
      tags: [Passkeys]
      summary: Finish passkey second factor (raw assertion JSON)
      security: []
      requestBody:
        required: true
        content: { application/json: { schema: { type: object } } }
      responses:
        "200": { description: "data: User", content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } } }

  # ---------------------------------------------------------------- Tokens
  /api/token:
    get:
      tags: [Tokens]
      summary: List own tokens
      parameters:
        - { $ref: "#/components/parameters/Page" }
        - { name: order, in: query, schema: { type: string, enum: [remain_quota, used_quota] } }
      responses:
        "200":
          description: "data: Token[]"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties: { data: { type: array, items: { $ref: "#/components/schemas/Token" } } }
    post:
      tags: [Tokens]
      summary: Create a token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                expired_time: { type: integer, format: int64 }
                remain_quota: { type: integer, format: int64 }
                unlimited_quota: { type: boolean }
                models: { type: string }
                subnet: { type: string }
      responses:
        "200": { description: "data: Token (with generated key)", content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } } }
    put:
      tags: [Tokens]
      summary: Update a token
      parameters:
        - { name: status_only, in: query, schema: { type: string }, description: "if present, only status is updated" }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/Token" } } }
      responses:
        "200": { description: "data: Token", content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } } }
  /api/token/search:
    get:
      tags: [Tokens]
      summary: Search own tokens
      parameters: [{ $ref: "#/components/parameters/Keyword" }]
      responses:
        "200": { description: "data: Token[]", content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } } }
  /api/token/{id}:
    get:
      tags: [Tokens]
      summary: Get a token
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { description: "data: Token", content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } } }
    delete:
      tags: [Tokens]
      summary: Delete a token
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EnvelopeEmpty" } } } }

  # ---------------------------------------------------------------- Channels
  /api/channel:
    get:
      tags: [Channels]
      summary: List channels (admin)
      parameters: [{ $ref: "#/components/parameters/Page" }]
      responses:
        "200":
          description: "data: Channel[]"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties: { data: { type: array, items: { $ref: "#/components/schemas/Channel" } } }
    post:
      tags: [Channels]
      summary: Create channel(s) — multi-key, split `key` on newlines (admin)
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/Channel" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EnvelopeEmpty" } } } }
    put:
      tags: [Channels]
      summary: Update channel (admin)
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/Channel" } } }
      responses:
        "200": { description: "data: Channel", content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } } }
  /api/channel/search:
    get:
      tags: [Channels]
      summary: Search channels (admin)
      parameters: [{ $ref: "#/components/parameters/Keyword" }]
      responses:
        "200": { description: "data: Channel[]", content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } } }
  /api/channel/models:
    get:
      tags: [Channels]
      summary: All known models as OpenAI model objects (admin)
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } } }
  /api/channel/test:
    get:
      tags: [Channels]
      summary: Test all channels (admin)
      parameters:
        - { name: scope, in: query, schema: { type: string, enum: [all, disabled], default: all } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EnvelopeEmpty" } } } }
  /api/channel/test/{id}:
    get:
      tags: [Channels]
      summary: Test one channel (admin)
      parameters:
        - { $ref: "#/components/parameters/IdPath" }
        - { name: model, in: query, schema: { type: string } }
      responses:
        "200": { description: "{ success, message, time (s), modelName }", content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } } }
  /api/channel/update_balance:
    get:
      tags: [Channels]
      summary: Refresh balance for all channels (admin)
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EnvelopeEmpty" } } } }
  /api/channel/update_balance/{id}:
    get:
      tags: [Channels]
      summary: Refresh balance for one channel (admin)
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { description: "data: { balance }", content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } } }
  /api/channel/disabled:
    delete:
      tags: [Channels]
      summary: Delete all disabled channels (admin)
      responses:
        "200": { description: "data: { rows }", content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } } }
  /api/channel/{id}:
    get:
      tags: [Channels]
      summary: Get a channel (admin)
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { description: "data: Channel", content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } } }
    delete:
      tags: [Channels]
      summary: Delete a channel (admin)
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EnvelopeEmpty" } } } }

  # ---------------------------------------------------------------- Redemptions
  /api/redemption:
    get:
      tags: [Redemptions]
      summary: List redemptions (admin)
      parameters: [{ $ref: "#/components/parameters/Page" }]
      responses:
        "200":
          description: "data: Redemption[]"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties: { data: { type: array, items: { $ref: "#/components/schemas/Redemption" } } }
    post:
      tags: [Redemptions]
      summary: Create a batch of codes (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, count, quota]
              properties:
                name: { type: string, description: "1–20 chars" }
                count: { type: integer, description: "1–100" }
                quota: { type: integer, format: int64 }
      responses:
        "200": { description: "data: string[] (generated keys)", content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } } }
    put:
      tags: [Redemptions]
      summary: Update a redemption (admin)
      parameters:
        - { name: status_only, in: query, schema: { type: string } }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/Redemption" } } }
      responses:
        "200": { description: "data: Redemption", content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } } }
  /api/redemption/search:
    get:
      tags: [Redemptions]
      summary: Search redemptions (admin)
      parameters: [{ $ref: "#/components/parameters/Keyword" }]
      responses:
        "200": { description: "data: Redemption[]", content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } } }
  /api/redemption/{id}:
    get:
      tags: [Redemptions]
      summary: Get a redemption (admin)
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { description: "data: Redemption", content: { application/json: { schema: { $ref: "#/components/schemas/Envelope" } } } }
    delete:
      tags: [Redemptions]
      summary: Delete a redemption (admin)
      parameters: [{ $ref: "#/components/parameters/IdPath" }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EnvelopeEmpty" } } } }

  # ---------------------------------------------------------------- Logs
  /api/log:
    get:
      tags: [Logs]
      summary: All logs (admin)
      parameters:
        - { $ref: "#/components/parameters/Page" }
        - { name: type, in: query, schema: { type: integer } }
        - { name: username, in: query, schema: { type: string } }
        - { name: token_name, in: query, schema: { type: string } }
        - { name: model_name, in: query, schema: { type: string } }
        - { name: start_timestamp, in: query, schema: { type: integer, format: int64 } }
        - { name: end_timestamp, in: query, schema: { type: integer, format: int64 } }
