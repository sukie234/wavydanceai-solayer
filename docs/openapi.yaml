                    properties: { data: { type: array, items: { $ref: "#/components/schemas/User" } } }
    post:
      tags: [AdminUsers]
      summary: Create a user (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
                display_name: { type: string }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EnvelopeEmpty" } } } }
    put:
      tags: [AdminUsers]
      summary: Update a user (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id: { type: integer }
                username: { type: string }
                password: { type: string }
                display_name: { type: string }
                role: { type: integer }
                status: { type: integer }
                quota: { type: integer, format: int64 }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EnvelopeEmpty" } } } }
